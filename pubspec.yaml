publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.32.0
  permission_handler: ^11.3.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.2
  csv: ^6.0.0
